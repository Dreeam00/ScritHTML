<!DOCTYPE html>
<html>
<head>
  <title>ScritHTML Demo</title>

  <script src="scrit.js"></script>
</head>
<body>
  <script type="text/scrit">
  <!-- ScritHTML コードはここに記述します -->
  <$message>Hello, ScritHTML!</$message>
  <$count>0</$count>

  <h1>{ message }</h1>
  <p>{count}</p>
  <button @click="count++">count+</button>
  <button @click="count--">count-</button>
</script>
</body>
</html>
